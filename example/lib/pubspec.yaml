name: permission_handler_example
description: A professional Flutter package for handling permissions automatically with Riverpod state management, retry logic, and beautiful UI dialogs.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler_package: ^1.0.0
  riverpod: ^3.3.1
  flutter_riverpod: ^3.3.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.1
  build_runner: ^2.8.0

flutter:
  uses-material-design: true